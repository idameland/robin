<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Robin — Takk!</title>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,600;0,700;1,600;1,700&family=Roboto+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --white:       #FFFFFF;
    --ink:         #1A1612;
    --ink-l:       #3D3530;
    --ink-m:       #6B6058;
    --ink-f:       #9A9088;
    --rule:        #E2DDD7;
    --c1:          #004E64;
    --c2:          #00A5CF;
    --c3:          #9FFFCB;
    --tag-bg:      #E0F9F0;
    --tag-txt:     #003D50;
    --radius:      8px;
    --radius-pill: 100px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Roboto Mono', monospace;
    background: var(--white);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* NAV */
  nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 48px;
    background: var(--white); border-bottom: 1px solid var(--rule);
  }
  .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
  .nav-logo-text {
    font-family: 'Newsreader', serif;
    font-size: 26px; font-weight: 700; color: var(--ink); letter-spacing: -0.3px;
  }

  /* MAIN */
  main {
    flex: 1;
    display: flex; align-items: center; justify-content: center;
    padding: 60px 24px;
  }

  .thank-you {
    max-width: 520px; width: 100%;
    text-align: center;
  }

  .bird-wrap {
    width: 80px; height: 80px; border-radius: 50%;
    background: var(--c3);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 32px;
  }

  .thank-you h1 {
    font-family: 'Newsreader', serif;
    font-size: 48px; font-weight: 700;
    letter-spacing: -1px; line-height: 1.05;
    margin-bottom: 8px;
  }
  .thank-you h1 em { font-style: italic; }

  .tagline {
    font-family: 'Newsreader', serif;
    font-size: 22px; font-style: italic;
    color: var(--ink-l); margin-bottom: 24px;
  }

  .thank-you p {
    font-size: 13px; color: var(--ink-m);
    line-height: 1.8; max-width: 400px;
    margin: 0 auto 40px;
  }

  .divider { border: none; border-top: 1px solid var(--rule); margin: 0 auto 40px; max-width: 80px; }

  .btn-home {
    display: inline-block;
    padding: 14px 32px;
    background: var(--ink); color: var(--white);
    border-radius: var(--radius);
    font-family: 'Roboto Mono', monospace;
    font-size: 13px; font-weight: 700;
    text-decoration: none; transition: background 0.15s;
  }
  .btn-home:hover { background: var(--c1); }

  /* FOOTER */
  footer {
    border-top: 1px solid var(--rule); padding: 24px 48px;
    display: flex; align-items: center; justify-content: space-between;
    background: var(--white);
  }
  .footer-logo { font-family: 'Newsreader', serif; font-size: 16px; color: var(--ink-m); }
  .footer-tagline { font-size: 11px; color: var(--ink-m); font-style: italic; }

  @media (max-width: 540px) {
    nav { padding: 14px 20px; }
    .thank-you h1 { font-size: 36px; }
    .tagline { font-size: 18px; }
  }
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="robin-forside-v2.html">
    <svg width="34" height="32" viewBox="0 0 38 36" fill="none">
      <ellipse cx="17" cy="24" rx="12" ry="10" fill="#4A3828"/>
      <circle cx="19" cy="12" r="10" fill="#4A3828"/>
      <path d="M9 17 Q6 22 9 27 Q13 32 19 31 Q26 30 29 24 Q32 19 27 15 Q23 11 18 12 Q12 12 9 17Z" fill="#C8400E"/>
      <path d="M13 18 Q11 22 13 26 Q16 29 21 28 Q25 27 26 23 Q21 16 17 15 Q14 14 13 18Z" fill="#D8501A" opacity=".4"/>
      <ellipse cx="20" cy="28" rx="5" ry="4" fill="#E8D8C0"/>
      <path d="M7 23 Q1 27 3 34 Q10 30 19 32" fill="#3A2818"/>
      <circle cx="25" cy="9" r="3" fill="#1A1208"/>
      <circle cx="25.8" cy="8.2" r="1" fill="white"/>
      <path d="M28 10 L35 8 L28 14 Z" fill="#3A3020"/>
      <line x1="16" y1="33" x2="12" y2="36" stroke="#3A2818" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="21" y1="33" x2="25" y2="36" stroke="#3A2818" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <span class="nav-logo-text">Robin</span>
  </a>
</nav>

<main>
  <div class="thank-you">

    <div class="bird-wrap">
      <svg width="44" height="42" viewBox="0 0 38 36" fill="none">
        <ellipse cx="17" cy="24" rx="12" ry="10" fill="#4A3828"/>
        <circle cx="19" cy="12" r="10" fill="#4A3828"/>
        <path d="M9 17 Q6 22 9 27 Q13 32 19 31 Q26 30 29 24 Q32 19 27 15 Q23 11 18 12 Q12 12 9 17Z" fill="#C8400E"/>
        <path d="M13 18 Q11 22 13 26 Q16 29 21 28 Q25 27 26 23 Q21 16 17 15 Q14 14 13 18Z" fill="#D8501A" opacity=".4"/>
        <ellipse cx="20" cy="28" rx="5" ry="4" fill="#E8D8C0"/>
        <path d="M7 23 Q1 27 3 34 Q10 30 19 32" fill="#3A2818"/>
        <circle cx="25" cy="9" r="3" fill="#1A1208"/>
        <circle cx="25.8" cy="8.2" r="1" fill="white"/>
        <path d="M28 10 L35 8 L28 14 Z" fill="#3A3020"/>
        <line x1="16" y1="33" x2="12" y2="36" stroke="#3A2818" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="21" y1="33" x2="25" y2="36" stroke="#3A2818" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>

    <h1>Takk for<br><em>anbefalingen!</em></h1>
    <p class="tagline">Du er grei.</p>

    <p>Robin har mottatt det du sendte inn og ser over det så snart vi kan. Godkjente anbefalinger dukker opp på forsiden.</p>

    <hr class="divider">

    <a class="btn-home" href="robin-forside-v2.html">← Tilbake til forsiden</a>

  </div>
</main>

<footer>
  <span class="footer-logo">Robin</span>
  <span class="footer-tagline">Den lille fuglen som alltid vet hvem du bør ringe.</span>
</footer>

</body>
</html>
